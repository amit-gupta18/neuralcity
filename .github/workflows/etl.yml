name: Run AQI ETL

on:
  schedule:
    - cron: '0 3 * * *'   # daily at 3 AM UTC
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas

      - name: Run ETL pipeline
        run: python etl/process_aqi.py --input etl/sample_data.csv --output src/data/cities.json

      - name: Commit updated cities.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/cities.json
          git diff --cached --quiet || git commit -m "chore: refresh AQI data [skip ci]"
          git push
